<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <!-- ── PWA / iOS Native ── -->
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="0.1% Studio">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>0.1% 매거진 스튜디오 v4</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js" crossorigin="anonymous"></script>
  <style>
    /* ━━ Reset & Touch Defense ━━ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent
    }

    html {
      overscroll-behavior: none;
      touch-action: pan-x pan-y
    }

    body {
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none
    }

    :root {
      --bg: #000;
      --sur: #1c1c1e;
      --sur2: #2c2c2e;
      --bd: #3a3a3c;
      --txt: #fff;
      --mut: #8e8e93;
      --acc: #0a84ff;
      --dan: #ff453a;
      --grn: #30d158;
      --warn: #ffd60a;
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100svh
    }

    /* ── Header ── */
    #hdr {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--sur);
      border-bottom: 1px solid var(--bd);
      padding-top: max(8px, env(safe-area-inset-top))
    }

    .logo {
      font-size: 13px;
      font-weight: 700
    }

    .logo em {
      color: var(--acc);
      font-style: normal
    }

    #hdr-r {
      display: flex;
      gap: 5px
    }

    .hb {
      padding: 5px 9px;
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 7px;
      color: var(--txt);
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: .12s;
      white-space: nowrap
    }

    .hb:active {
      opacity: .65
    }

    .hb.dn {
      color: var(--dan)
    }

    .hb.acc {
      background: var(--acc);
      border-color: var(--acc)
    }

    /* ── Workspace ── */
    #ws {
      flex: 1;
      min-height: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px;
      overflow: hidden;
      background: #070707;
      position: relative
    }

    #cwrap {
      position: relative;
      border-radius: 8px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, .95), 0 0 0 1px rgba(255, 255, 255, .055)
    }

    canvas {
      display: block;
      border-radius: 8px
    }

    /* ── Dashed Snap Lines ── */
    .snap {
      position: absolute;
      pointer-events: none;
      display: none;
      z-index: 20
    }

    #sg-v {
      top: 0;
      bottom: 0;
      width: 2px;
      left: 50%;
      transform: translateX(-50%);
      background: repeating-linear-gradient(to bottom, var(--acc) 0, var(--acc) 5px, transparent 5px, transparent 11px)
    }

    #sg-h {
      left: 0;
      right: 0;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
      background: repeating-linear-gradient(to right, var(--acc) 0, var(--acc) 5px, transparent 5px, transparent 11px)
    }

    /* ── Bottom Sheet ── */
    #sheet {
      flex-shrink: 0;
      background: var(--sur);
      border-top: 1px solid var(--bd)
    }

    /* Sliding panel with cubic-bezier */
    #panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height .32s cubic-bezier(.32, 0, .67, 0)
    }

    #panel.open {
      max-height: 260px;
      transition: max-height .36s cubic-bezier(.33, 1, .68, 1)
    }

    .sub-panel {
      display: none;
      padding: 12px 14px;
      overflow-y: auto;
      max-height: 260px;
      -webkit-overflow-scrolling: touch
    }

    .sub-panel.active {
      display: block
    }

    /* Tab bar */
    #tabbar {
      display: flex;
      gap: 5px;
      padding: 7px 12px;
      background: var(--sur);
      border-bottom: 1px solid var(--bd)
    }

    .tab {
      flex: 1;
      padding: 8px 2px;
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      color: var(--mut);
      font-size: 11px;
      cursor: pointer;
      transition: .12s;
      font-family: inherit;
      white-space: nowrap
    }

    .tab:active {
      transform: scale(.96)
    }

    .tab.on {
      background: var(--acc);
      border-color: var(--acc);
      color: #fff
    }

    /* Publish row */
    #bot {
      display: flex;
      gap: 6px;
      padding: 7px 12px;
      padding-bottom: max(7px, var(--safe-bot))
    }

    #pub {
      flex: 1;
      padding: 12px;
      background: var(--acc);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: .12s
    }

    #pub:active {
      transform: scale(.98)
    }

    #pub:disabled {
      background: var(--sur2);
      color: var(--mut)
    }

    #btn-hq {
      padding: 12px 14px;
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      color: var(--txt);
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap
    }

    #btn-hq:active {
      opacity: .7
    }

    /* Panel UI */
    .ptitle {
      font-size: 10px;
      color: var(--mut);
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 10px
    }

    .bttl {
      font-size: 10px;
      color: var(--acc);
      font-weight: 600;
      margin: 9px 0 5px;
      padding-top: 8px;
      border-top: 1px solid var(--bd)
    }

    .bttl:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: none
    }

    .pr {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px
    }

    .pr:last-child {
      margin-bottom: 0
    }

    .pr label {
      font-size: 10px;
      color: var(--mut);
      min-width: 44px;
      flex-shrink: 0
    }

    .pi {
      flex: 1;
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 7px;
      padding: 6px 8px;
      color: var(--txt);
      font-size: 13px;
      font-family: inherit
    }

    .pi:focus {
      outline: none;
      border-color: var(--acc)
    }

    .pi[type=range] {
      padding: 0;
      height: 25px
    }

    .pi[type=color] {
      height: 30px;
      padding: 2px;
      cursor: pointer
    }

    .pv {
      font-size: 10px;
      color: var(--mut);
      min-width: 32px;
      text-align: right
    }

    .fbtn {
      flex: 1;
      padding: 7px;
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 7px;
      color: var(--txt);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      font-family: inherit
    }

    .fbtn:active {
      opacity: .65
    }

    .sel-box {
      display: none;
      margin-top: 8px;
      padding: 9px;
      background: rgba(10, 132, 255, .1);
      border: 1px solid rgba(10, 132, 255, .3);
      border-radius: 8px
    }

    /* Loading */
    #ld {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .96);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: .3s
    }

    #ld.hide {
      opacity: 0;
      pointer-events: none
    }

    .sp {
      width: 38px;
      height: 38px;
      border: 3px solid var(--bd);
      border-top-color: var(--acc);
      border-radius: 50%;
      animation: spin .75s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #ld p {
      margin-top: 12px;
      color: var(--mut);
      font-size: 12px
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--sur2);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 12px;
      opacity: 0;
      transition: .22s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 9998
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    input[type=file] {
      display: none
    }
  </style>
</head>

<body>
  <div id="ld">
    <div class="sp"></div>
    <p id="ld-p">V4 로딩 중...</p>
  </div>

  <div id="app">
    <!-- Header -->
    <div id="hdr">
      <div class="logo">[<em>0.1%</em>] Studio <span style="color:var(--mut);font-size:10px">v4</span></div>
      <div id="hdr-r">
        <button class="hb" onclick="doUndo()" title="실행취소">↩</button>
        <button class="hb" onclick="doRedo()" title="다시실행">↪</button>
        <button class="hb" onclick="selTypo()">↕ 텍스트</button>
        <button class="hb dn" onclick="delSel()">✕</button>
        <button class="hb" onclick="doReset()">↺</button>
      </div>
    </div>

    <!-- Canvas Workspace -->
    <div id="ws">
      <div id="cwrap">
        <div id="sg-v" class="snap"></div>
        <div id="sg-h" class="snap"></div>
        <canvas id="c"></canvas>
      </div>
    </div>

    <!-- Bottom Sheet -->
    <div id="sheet">
      <div id="panel">

        <!-- ══ TEXT PANEL ══ -->
        <div id="p-text" class="sub-panel">
          <div class="ptitle">✦ 타이포그래피</div>
          <div class="bttl">대제목</div>
          <div class="pr"><label>내용</label><input class="pi" id="t-hl" type="text" oninput="upHl(this.value)"
              placeholder="헤드라인"></div>
          <div class="pr">
            <label>크기</label>
            <input class="pi" type="range" id="t-hl-sz" min="10" max="120" value="44" oninput="upHlSz(this.value)">
            <span class="pv" id="t-hl-sz-v">44</span>
          </div>
          <div class="pr"><label>색상</label><input class="pi" type="color" id="t-hl-col" value="#ffffff"
              oninput="upHlCol(this.value)"></div>
          <div class="pr">
            <label>자간</label>
            <input class="pi" type="range" id="t-cs" min="-200" max="800" step="10" value="0"
              oninput="upCS(this.value)">
            <span class="pv" id="t-cs-v">0</span>
          </div>
          <div class="pr">
            <label>행간</label>
            <input class="pi" type="range" id="t-lh" min="60" max="250" step="5" value="120" oninput="upLH(this.value)">
            <span class="pv" id="t-lh-v">1.2</span>
          </div>
          <div class="bttl">소제목</div>
          <div class="pr"><label>내용</label><input class="pi" id="t-sl" type="text" oninput="upSl(this.value)"
              placeholder="서브라인"></div>
          <div class="pr">
            <label>크기</label>
            <input class="pi" type="range" id="t-sl-sz" min="8" max="80" value="30" oninput="upSlSz(this.value)">
            <span class="pv" id="t-sl-sz-v">30</span>
          </div>
          <div class="pr"><label>색상</label><input class="pi" type="color" id="t-sl-col" value="#dddddd"
              oninput="upSlCol(this.value)"></div>
          <div class="pr">
            <label>투명도</label>
            <input class="pi" type="range" id="t-op" min="0" max="100" value="100" oninput="upTypoOp(this.value)">
            <span class="pv" id="t-op-v">100%</span>
          </div>
          <!-- Rich Text Selection Area -->
          <div class="sel-box" id="r-sel">
            <div style="font-size:10px;color:var(--acc);font-weight:700;margin-bottom:7px">✦ 선택 텍스트 스타일</div>
            <div class="pr"><label>색상</label><input class="pi" type="color" id="sel-col" value="#ffea00"
                oninput="upSelCol(this.value)"></div>
            <div class="pr">
              <label>크기</label>
              <input class="pi" type="range" id="sel-sz" min="8" max="120" value="44" oninput="upSelSz(this.value)">
              <span class="pv" id="sel-sz-v">44</span>
            </div>
          </div>
        </div>

        <!-- ══ PiP PANEL ══ -->
        <div id="p-pip" class="sub-panel">
          <div class="ptitle">⊕ PiP 원형 인서트</div>
          <div class="pr">
            <button class="fbtn" onclick="trigPip()">📎 이미지 업로드</button>
          </div>
          <div id="pip-ctrls" style="display:none">
            <div class="bttl">테두리</div>
            <div class="pr">
              <label>두께</label>
              <input class="pi" type="range" id="pip-sw" min="0" max="24" value="4" oninput="updPipSW(this.value)">
              <span class="pv" id="pip-sw-v">4</span>
            </div>
            <div class="pr"><label>색상</label><input class="pi" type="color" id="pip-sc" value="#ffffff"
                oninput="updPipSC(this.value)"></div>
            <div class="bttl">내부 이미지 패닝/크롭</div>
            <div class="pr">
              <label>X 이동</label>
              <input class="pi" type="range" id="pip-px" min="-120" max="120" value="0"
                oninput="updPipPanX(this.value)">
              <span class="pv" id="pip-px-v">0</span>
            </div>
            <div class="pr">
              <label>Y 이동</label>
              <input class="pi" type="range" id="pip-py" min="-120" max="120" value="0"
                oninput="updPipPanY(this.value)">
              <span class="pv" id="pip-py-v">0</span>
            </div>
            <div class="pr">
              <label>줌</label>
              <input class="pi" type="range" id="pip-zm" min="100" max="400" value="100" step="5"
                oninput="updPipZoom(this.value)">
              <span class="pv" id="pip-zm-v">1.0×</span>
            </div>
            <div class="pr">
              <label>투명도</label>
              <input class="pi" type="range" id="pip-op" min="0" max="100" value="100" oninput="updPipOp(this.value)">
              <span class="pv" id="pip-op-v">100%</span>
            </div>
          </div>
        </div>

        <!-- ══ LOGO & TEMPLATE PANEL ══ -->
        <div id="p-logo" class="sub-panel">
          <div class="ptitle">◈ 로고 · 템플릿</div>
          <div class="pr">
            <button class="fbtn" onclick="trigLogo()">📎 로고 업로드</button>
          </div>
          <div class="bttl">로고 조절</div>
          <div class="pr"><label>색상</label><input class="pi" type="color" id="logo-col" value="#ffffff"
              oninput="updLogoCol(this.value)"></div>
          <div class="pr">
            <label>투명도</label>
            <input class="pi" type="range" id="logo-op" min="0" max="100" value="90" oninput="updLogoOp(this.value)">
            <span class="pv" id="logo-op-v">90%</span>
          </div>
          <div class="bttl">템플릿 관리</div>
          <div class="pr">
            <button class="fbtn" onclick="saveTemplate()">💾 템플릿 저장</button>
            <button class="fbtn" onclick="loadTemplate()">📂 불러오기</button>
          </div>
        </div>
      </div><!-- /#panel -->

      <!-- Tab bar -->
      <div id="tabbar">
        <button class="tab" data-tab="text" onclick="openTab('text')">✦ 텍스트</button>
        <button class="tab" data-tab="pip" onclick="openTab('pip')">⊕ PiP</button>
        <button class="tab" data-tab="logo" onclick="openTab('logo')">◈ 로고</button>
      </div>

      <!-- Publish -->
      <div id="bot">
        <button id="pub" onclick="publish()">🚀 발행</button>
        <button id="btn-hq" onclick="hqExport()">💾 HQ</button>
      </div>
    </div><!-- /#sheet -->
  </div>
  <div id="toast"></div>

  <input type="file" id="fi-pip" accept="image/*" onchange="loadPip(this)">
  <input type="file" id="fi-logo" accept="image/*" onchange="loadLogo(this)">

  <script>
    'use strict';
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Touch Defence — prevent pinch-zoom / rubber-band
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Telegram
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }
    const P = new URLSearchParams(location.search);
    const IMG = P.get('img') || '';
    const TITLE = decodeURIComponent(P.get('title') || '헤드라인을 입력하세요');
    const SUB = decodeURIComponent(P.get('sub') || '서브라인을 입력하세요');

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Canvas — dynamic sizing (accounts for max panel height)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const RATIO = 1350 / 1080;
    const MAX_PNL = 260;   // max panel height (matches CSS max-height)
    const wsEl = document.getElementById('ws');
    const HDR_H = 48;
    const TAB_H = 50;
    const BOT_H = 52;
    const CHROME = HDR_H + TAB_H + BOT_H + MAX_PNL + 28; // total chrome when open
    const WS_H = window.innerHeight - CHROME;           // available canvas area height
    const CW = Math.min(wsEl.clientWidth - 28, Math.floor(WS_H / RATIO));
    const CH = Math.round(CW * RATIO);

    const fc = new fabric.Canvas('c', {
      width: CW, height: CH, backgroundColor: '#111',
      preserveObjectStacking: true, selection: true,
    });

    // ── Global control styles ─────────────────────────────────────────
    fabric.Object.prototype.set({
      cornerStyle: 'circle', cornerSize: 13,
      cornerColor: '#fff', cornerStrokeColor: '#0a84ff',
      borderColor: '#0a84ff', borderScaleFactor: 2,
      transparentCorners: false, padding: 5,
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Object Registry
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let HL = null;   // fabric.Textbox — headline
    let SL = null;   // fabric.Textbox — subline
    let logoObj = null;   // fabric.Image   — logo
    const PIPS = [];     // [{img, border}]

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Z-Index Stack Enforcement
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const Z = { dimmer: 0, pip_img: 1, pip_border: 2, subline: 3, headline: 4, logo: 99 };
    function reStack() {
      const objs = [...fc.getObjects()].sort((a, b) => {
        const za = Z[a.elementType] ?? 50;
        const zb = Z[b.elementType] ?? 50;
        return za - zb;
      });
      fc._objects = objs;
      fc.requestRenderAll();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // State Management — Undo/Redo + localStorage
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const UNDO_MAX = 20;
    const STORE_KEY = 'studio_v4_state';
    let _undo = [], _redo = [], _suspendSave = false;

    const CUSTOM_PROPS = ['elementType', '_panX', '_panY', '_zoom', '_baseScale', '_clipCX', '_clipCY'];

    function captureJSON() {
      return JSON.stringify(fc.toJSON(CUSTOM_PROPS));
    }

    function saveState() {
      if (_suspendSave) return;
      const s = captureJSON();
      _undo.push(s);
      if (_undo.length > UNDO_MAX) _undo.shift();
      _redo = [];
      try { localStorage.setItem(STORE_KEY, s); } catch (e) { }
    }

    function restoreJSON(s, cb) {
      _suspendSave = true;
      fc.loadFromJSON(JSON.parse(s), () => {
        fc.renderAll();
        syncRefs();
        reStack();
        _suspendSave = false;
        if (cb) cb();
      });
    }

    function doUndo() {
      if (_undo.length < 2) { toast('더 이상 되돌릴 수 없습니다'); return; }
      _redo.push(_undo.pop());
      restoreJSON(_undo[_undo.length - 1]);
    }
    function doRedo() {
      if (!_redo.length) { toast('다시 실행할 항목이 없습니다'); return; }
      const s = _redo.pop();
      _undo.push(s);
      restoreJSON(s);
    }

    function syncRefs() {
      const objs = fc.getObjects();
      HL = objs.find(o => o.elementType === 'headline') || null;
      SL = objs.find(o => o.elementType === 'subline') || null;
      logoObj = objs.find(o => o.elementType === 'logo') || null;
      PIPS.length = 0;
      const borders = objs.filter(o => o.elementType === 'pip_border');
      const imgs = objs.filter(o => o.elementType === 'pip_img');
      imgs.forEach(img => {
        const b = borders.find(b =>
          Math.abs(b.left - (img._clipCX || 0)) < 20 &&
          Math.abs(b.top - (img._clipCY || 0)) < 20
        );
        if (b) {
          b._img = img; img._border = b;
          attachPipMoveEvent(b, img);
          PIPS.push({ img, border: b });
        }
      });
      updateTextPanel();
    }

    // Auto-save on changes
    ['object:modified', 'object:added', 'object:removed'].forEach(ev => {
      fc.on(ev, saveState);
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Cover Background
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function loadBgCover(url, cb) {
      if (!url) { cb(); return; }
      ldTxt('배경 로딩...');
      fabric.Image.fromURL(url, (img, err) => {
        if (!err && img?.width) {
          const sc = Math.max(CW / img.width, CH / img.height);
          fc.setBackgroundImage(img, () => {
            img.set({
              scaleX: sc, scaleY: sc,
              left: (CW - img.width * sc) / 2, top: (CH - img.height * sc) / 2,
              originX: 'left', originY: 'top'
            });
            fc.renderAll(); cb();
          });
        } else { toast('⚠️ 배경 로드 실패'); cb(); }
      }, { crossOrigin: 'anonymous' });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Dimmer + Typography (Textbox)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function addDimmer() {
      const h = CH * 0.52;
      fc.add(new fabric.Rect({
        left: 0, top: CH - h, width: CW, height: h,
        fill: new fabric.Gradient({
          type: 'linear', gradientUnits: 'pixels',
          coords: { x1: 0, y1: 0, x2: 0, y2: h },
          colorStops: [
            { offset: 0, color: 'rgba(0,0,0,0)' },
            { offset: 0.45, color: 'rgba(0,0,0,0.55)' },
            { offset: 1, color: 'rgba(0,0,0,0.92)' },
          ]
        }),
        selectable: false, evented: false, elementType: 'dimmer',
      }));
    }

    function addTypo(title, sub) {
      const hlSz = Math.round(CW * 0.068);
      const slSz = Math.round(CW * 0.042);
      const PAD = Math.round(CW * 0.06);
      const TW = Math.round(CW * 0.88);

      HL = new fabric.Textbox(title, {
        left: PAD, top: Math.round(CH * 0.775),
        width: TW, fontSize: hlSz, fontWeight: '700',
        fontFamily: '-apple-system,Helvetica Neue,Arial,sans-serif',
        fill: '#ffffff', lineHeight: 1.2, charSpacing: 0,
        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,.85)', blur: 10, offsetX: 1, offsetY: 2 }),
        selectable: true, editable: true, elementType: 'headline',
      });
      SL = new fabric.Textbox(sub, {
        left: PAD, top: Math.round(CH * 0.775) + hlSz * 1.5 + 8,
        width: TW, fontSize: slSz,
        fontFamily: '-apple-system,Helvetica Neue,Arial,sans-serif',
        fill: '#dddddd', lineHeight: 1.2, charSpacing: 0,
        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,.75)', blur: 7, offsetX: 1, offsetY: 1 }),
        selectable: true, editable: true, elementType: 'subline',
      });
      fc.add(SL); fc.add(HL);

      // Init panel
      el('t-hl').value = title;
      el('t-sl').value = sub;
      el('t-hl-sz').value = hlSz; el('t-hl-sz-v').textContent = hlSz;
      el('t-sl-sz').value = slSz; el('t-sl-sz-v').textContent = slSz;
    }

    function selTypo() { // Select both headline and subline as a group
      if (!HL || !SL) return;
      const sel = new fabric.ActiveSelection([HL, SL], { canvas: fc });
      fc.setActiveObject(sel); fc.renderAll();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Logo — RemoveColor + BlendColor
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function applyLogoFilters(img, tint) {
      img.filters = [new fabric.Image.filters.RemoveColor({ color: '#000000', distance: 0.28 })];
      const col = (tint || '#ffffff').toLowerCase();
      if (col !== '#ffffff') {
        img.filters.push(new fabric.Image.filters.BlendColor({ color: col, mode: 'multiply', alpha: 1 }));
      }
      img.applyFilters();
    }

    function mountLogo(img) {
      const sc = Math.min((CW * 0.32) / img.width, 1);
      img.set({
        scaleX: sc, scaleY: sc,
        left: CW / 2, originX: 'center', top: CH * 0.023,
        opacity: 0.9, elementType: 'logo',
        selectable: false, evented: false,   // Z:99 lock, use panel controls only
      });
      if (logoObj) fc.remove(logoObj);
      logoObj = img;
      fc.add(img); reStack(); fc.renderAll();
    }

    function autoLoadLogo() {
      fabric.Image.fromURL('./logo_wb.jpg', (img, err) => {
        if (err || !img?.width) return;
        applyLogoFilters(img, '#ffffff');
        mountLogo(img);
      }, { crossOrigin: 'anonymous' });
    }

    function trigLogo() { document.getElementById('fi-logo').click(); }
    function loadLogo(inp) {
      const file = inp.files[0]; if (!file) return;
      const url = URL.createObjectURL(file);
      fabric.Image.fromURL(url, (img, err) => {
        URL.revokeObjectURL(url);
        if (err || !img) { toast('⚠️ 로고 로드 실패'); return; }
        applyLogoFilters(img, el('logo-col').value || '#ffffff');
        mountLogo(img); toast('✅ 로고 추가됨'); inp.value = '';
        saveState();
      }, { crossOrigin: 'anonymous' });
    }

    function updLogoCol(v) {
      if (!logoObj) return;
      applyLogoFilters(logoObj, v); fc.renderAll(); saveState();
    }
    function updLogoOp(v) {
      el('logo-op-v').textContent = v + '%';
      if (logoObj) { logoObj.set('opacity', v / 100); fc.renderAll(); saveState(); }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // PiP — absolutePositioned clip + inner pan/zoom
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function trigPip() { document.getElementById('fi-pip').click(); }

    function attachPipMoveEvent(border, img) {
      border.off('moving'); // remove previous to avoid duplicates
      border.on('moving', function () {
        const nx = this.left, ny = this.top;
        // Update absolutePositioned clip
        if (img.clipPath) { img.clipPath.left = nx; img.clipPath.top = ny; }
        img._clipCX = nx; img._clipCY = ny;
        img.set({ left: nx + (img._panX || 0), top: ny + (img._panY || 0) });
        fc.renderAll();
      });
      border.on('modified', saveState);
    }

    function loadPip(inp) {
      const file = inp.files[0]; if (!file) return;
      const url = URL.createObjectURL(file);
      const R = Math.round(CW * 0.15);
      const cx = CW - R - Math.round(CW * 0.05);
      const cy = CH - R - Math.round(CH * 0.04);

      fabric.Image.fromURL(url, (img, err) => {
        URL.revokeObjectURL(url);
        if (err || !img) { toast('⚠️ PiP 실패'); return; }

        const minDim = Math.min(img.width, img.height);
        const baseScale = (R * 2) / minDim;

        // absolutePositioned clip → image pans independently
        const clip = new fabric.Circle({
          radius: R, left: cx, top: cy,
          originX: 'center', originY: 'center',
          absolutePositioned: true,
        });

        img.set({
          left: cx, top: cy,
          originX: 'center', originY: 'center',
          scaleX: baseScale, scaleY: baseScale,
          clipPath: clip,
          elementType: 'pip_img',
          selectable: false, evented: false,   // moved only via border
          _baseScale: baseScale, _clipCX: cx, _clipCY: cy,
          _panX: 0, _panY: 0, _zoom: 1,
        });

        const border = new fabric.Circle({
          radius: R + 3, fill: 'transparent', stroke: '#ffffff', strokeWidth: 4,
          left: cx, top: cy, originX: 'center', originY: 'center',
          elementType: 'pip_border',
        });
        border._img = img; img._border = border;
        attachPipMoveEvent(border, img);

        PIPS.push({ img, border });
        fc.add(img); fc.add(border);
        reStack();
        fc.setActiveObject(border);
        fc.renderAll(); saveState();
        toast('✅ PiP 추가됨'); inp.value = '';
        openTab('pip');
        el('pip-ctrls').style.display = 'block';
        resetPipPanel();
      }, { crossOrigin: 'anonymous' });
    }

    function getActivePip() {
      const obj = fc.getActiveObject();
      if (!obj || obj.elementType !== 'pip_border') return null;
      return obj._img || null;
    }

    function resetPipPanel() {
      el('pip-px').value = 0; el('pip-px-v').textContent = '0';
      el('pip-py').value = 0; el('pip-py-v').textContent = '0';
      el('pip-zm').value = 100; el('pip-zm-v').textContent = '1.0×';
      el('pip-op').value = 100; el('pip-op-v').textContent = '100%';
      el('pip-sw').value = 4; el('pip-sw-v').textContent = '4';
      el('pip-sc').value = '#ffffff';
    }

    function updPipSW(v) {
      el('pip-sw-v').textContent = v;
      const b = fc.getActiveObject(); if (!b || b.elementType !== 'pip_border') return;
      b.set('strokeWidth', parseInt(v)); fc.renderAll();
    }
    function updPipSC(v) {
      const b = fc.getActiveObject(); if (!b || b.elementType !== 'pip_border') return;
      b.set('stroke', v); fc.renderAll();
    }
    function updPipPanX(v) {
      el('pip-px-v').textContent = v;
      const img = getActivePip(); if (!img) return;
      img._panX = parseInt(v);
      img.set('left', img._clipCX + img._panX); fc.renderAll();
    }
    function updPipPanY(v) {
      el('pip-py-v').textContent = v;
      const img = getActivePip(); if (!img) return;
      img._panY = parseInt(v);
      img.set('top', img._clipCY + img._panY); fc.renderAll();
    }
    function updPipZoom(v) {
      el('pip-zm-v').textContent = (v / 100).toFixed(1) + '×';
      const img = getActivePip(); if (!img) return;
      const z = v / 100;
      img._zoom = z;
      img.set({ scaleX: img._baseScale * z, scaleY: img._baseScale * z }); fc.renderAll();
    }
    function updPipOp(v) {
      el('pip-op-v').textContent = v + '%';
      const obj = fc.getActiveObject(); if (!obj || obj.elementType !== 'pip_border') return;
      obj.set('opacity', v / 100);
      if (obj._img) obj._img.set('opacity', v / 100);
      fc.renderAll();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Typography Panel Controls
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function updateTextPanel() {
      if (HL) {
        el('t-hl').value = HL.text || '';
        el('t-hl-sz').value = Math.round(HL.fontSize);
        el('t-hl-sz-v').textContent = Math.round(HL.fontSize);
        el('t-hl-col').value = HL.fill || '#ffffff';
        el('t-cs').value = Math.round(HL.charSpacing || 0);
        el('t-cs-v').textContent = Math.round(HL.charSpacing || 0);
        el('t-lh').value = Math.round((HL.lineHeight || 1.2) * 100);
        el('t-lh-v').textContent = (HL.lineHeight || 1.2).toFixed(1);
      }
      if (SL) {
        el('t-sl').value = SL.text || '';
        el('t-sl-sz').value = Math.round(SL.fontSize);
        el('t-sl-sz-v').textContent = Math.round(SL.fontSize);
        el('t-sl-col').value = SL.fill || '#dddddd';
      }
      const op = HL ? Math.round((HL.opacity ?? 1) * 100) : 100;
      el('t-op').value = op; el('t-op-v').textContent = op + '%';
    }

    function upHl(v) { if (HL) { HL.set('text', v); fc.renderAll(); } }
    function upHlSz(v) { el('t-hl-sz-v').textContent = v; if (HL) { HL.set('fontSize', +v); fc.renderAll(); } }
    function upHlCol(v) { if (HL) { HL.set('fill', v); fc.renderAll(); } }
    function upCS(v) {
      el('t-cs-v').textContent = v;
      if (HL) { HL.set('charSpacing', +v); fc.renderAll(); }
    }
    function upLH(v) {
      const lh = (v / 100).toFixed(1); el('t-lh-v').textContent = lh;
      if (HL) { HL.set('lineHeight', parseFloat(lh)); fc.renderAll(); }
    }
    function upSl(v) { if (SL) { SL.set('text', v); fc.renderAll(); } }
    function upSlSz(v) { el('t-sl-sz-v').textContent = v; if (SL) { SL.set('fontSize', +v); fc.renderAll(); } }
    function upSlCol(v) { if (SL) { SL.set('fill', v); fc.renderAll(); } }
    function upTypoOp(v) { el('t-op-v').textContent = v + '%'; if (HL) HL.set('opacity', v / 100); if (SL) SL.set('opacity', v / 100); fc.renderAll(); }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Rich Text — setSelectionStyles
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let _editTxt = null, _sS = 0, _sE = 0;
    fc.on('text:selection:changed', e => {
      _editTxt = e.target; _sS = e.target.selectionStart; _sE = e.target.selectionEnd;
      const has = _sS !== _sE;
      el('r-sel').style.display = has ? 'block' : 'none';
      if (has) openTab('text');
    });
    fc.on('text:editing:exited', () => { _editTxt = null; el('r-sel').style.display = 'none'; });

    function upSelCol(v) {
      if (_editTxt && _sS !== _sE) { _editTxt.setSelectionStyles({ fill: v }, _sS, _sE); fc.renderAll(); }
    }
    function upSelSz(v) {
      el('sel-sz-v').textContent = v;
      if (_editTxt && _sS !== _sE) { _editTxt.setSelectionStyles({ fontSize: +v }, _sS, _sE); fc.renderAll(); }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 5 · Centre Snap — 15px, dashed guides
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const sgV = el2('sg-v'), sgH = el2('sg-h');
    const SNAP = 15;
    fc.on('object:moving', e => {
      const o = e.target; if (!o) return;
      const b = o.getBoundingRect(true, true);
      const cx = b.left + b.width / 2, cy = b.top + b.height / 2;
      if (Math.abs(cx - CW / 2) < SNAP) { o.set({ left: o.left + (CW / 2 - cx) }); o.setCoords(); sgV.style.display = 'block'; }
      else sgV.style.display = 'none';
      if (Math.abs(cy - CH / 2) < SNAP) { o.set({ top: o.top + (CH / 2 - cy) }); o.setCoords(); sgH.style.display = 'block'; }
      else sgH.style.display = 'none';
    });
    ['object:modified', 'mouse:up'].forEach(ev => fc.on(ev, () => {
      sgV.style.display = 'none'; sgH.style.display = 'none';
    }));

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Selection — auto-open tab
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    fc.on('selection:created', e => onSelect(e.selected[0]));
    fc.on('selection:updated', e => onSelect(e.selected[0]));

    function onSelect(obj) {
      if (!obj) return;
      const t = obj.elementType;
      if (t === 'headline' || t === 'subline') { openTab('text'); updateTextPanel(); }
      else if (t === 'pip_border') {
        openTab('pip'); el('pip-ctrls').style.display = 'block';
        const img = obj._img;
        el('pip-sw').value = obj.strokeWidth || 4; el('pip-sw-v').textContent = obj.strokeWidth || 4;
        el('pip-sc').value = obj.stroke || '#ffffff';
        if (img) {
          el('pip-px').value = img._panX || 0; el('pip-px-v').textContent = img._panX || 0;
          el('pip-py').value = img._panY || 0; el('pip-py-v').textContent = img._panY || 0;
          const z = Math.round((img._zoom || 1) * 100);
          el('pip-zm').value = z; el('pip-zm-v').textContent = (z / 100).toFixed(1) + '×';
          el('pip-op').value = Math.round((img.opacity ?? 1) * 100);
          el('pip-op-v').textContent = el('pip-op').value + '%';
        }
      }
      else if (t === 'logo') {
        openTab('logo');
        el('logo-op').value = Math.round((obj.opacity ?? 1) * 100);
        el('logo-op-v').textContent = el('logo-op').value + '%';
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Tab / Sheet
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let _tab = null, _panOpen = false;
    function openTab(tab) {
      if (_tab === tab && _panOpen) { closePanel(); return; }
      _tab = tab; _panOpen = true;
      document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('p-' + tab).classList.add('active');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
      const btn = document.querySelector(`.tab[data-tab="${tab}"]`);
      if (btn) btn.classList.add('on');
      document.getElementById('panel').classList.add('open');
    }
    function closePanel() {
      _panOpen = false;
      document.getElementById('panel').classList.remove('open');
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Actions
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function delSel() {
      const obj = fc.getActiveObject(); if (!obj) return;
      const t = obj.elementType;
      if (t === 'dimmer') { toast('그라데이션 삭제 불가'); return; }
      if (t === 'pip_border' && obj._img) fc.remove(obj._img);
      if (t === 'headline') HL = null;
      if (t === 'subline') SL = null;
      if (t === 'logo') logoObj = null;
      if (obj.getObjects) obj.getObjects().forEach(o => { if (o === HL) HL = null; if (o === SL) SL = null; }); // ActiveSelection
      fc.remove(obj); fc.renderAll(); saveState();
    }

    function doReset() {
      if (!confirm('캔버스를 초기화할까요?')) return;
      _suspendSave = true;
      PIPS.forEach(p => { fc.remove(p.img); fc.remove(p.border) }); PIPS.length = 0;
      [HL, SL, logoObj].forEach(o => { if (o) fc.remove(o); });
      HL = SL = logoObj = null;
      fc.getObjects().filter(o => o.elementType === 'dimmer').forEach(o => fc.remove(o));
      addDimmer(); addTypo(TITLE, SUB); reStack();
      fc.renderAll(); _suspendSave = false; saveState(); closePanel();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Template Save / Load
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    async function saveTemplate() {
      const json = captureJSON();
      try {
        await navigator.clipboard.writeText(json);
        toast('✅ 클립보드에 복사됨 — 메모장에 붙여넣어 저장하세요');
      } catch (e) {
        // Fallback: prompt
        prompt('아래 JSON을 복사하세요:', json);
      }
    }

    async function loadTemplate() {
      try {
        const text = await navigator.clipboard.readText();
        const json = JSON.parse(text);
        _undo.push(captureJSON());
        restoreJSON(JSON.stringify(json), () => toast('✅ 템플릿 복원 완료'));
      } catch (e) {
        // Fallback: prompt
        const text = prompt('JSON 템플릿을 붙여넣으세요:');
        if (!text) return;
        try {
          const json = JSON.parse(text);
          _undo.push(captureJSON());
          restoreJSON(JSON.stringify(json), () => toast('✅ 템플릿 복원 완료'));
        } catch (ee) { toast('❌ 유효하지 않은 JSON'); }
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HQ Export — 1080×1350, Quality 1.0
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function hqExport() {
      const mult = 1080 / CW;   // scale to full 1080×1350
      const url = fc.toDataURL({ format: 'jpeg', quality: 1.0, multiplier: mult });
      const a = document.createElement('a');
      a.href = url; a.download = '0.1pct_magazine.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      toast('💾 1080×1350 이미지 저장 완료');
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Recipe Extraction + Publish
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function extractRecipe() {
      const elements = [];
      fc.getObjects().forEach(obj => {
        const t = obj.elementType;
        if (!t || t === 'dimmer' || t === 'pip_img' || t === 'pip_border') return;
        if (t === 'headline' || t === 'subline') {
          elements.push({
            type: t, text: obj.text || '',
            left: obj.left, top: obj.top,
            fontSize: obj.fontSize, fill: obj.fill || '#ffffff',
            scaleX: obj.scaleX || 1, scaleY: obj.scaleY || 1,
            angle: obj.angle || 0, width: obj.width,
            charSpacing: obj.charSpacing || 0,
            lineHeight: obj.lineHeight || 1.2,
            styles: obj.styles || {},
          });
        } else if (t === 'logo') {
          elements.push({
            type: 'logo', left: obj.left, top: obj.top,
            scaleX: obj.scaleX || 1, scaleY: obj.scaleY || 1, angle: obj.angle || 0,
            width: obj.width, height: obj.height, opacity: obj.opacity ?? 1
          });
        }
      });
      // PiP elements
      PIPS.forEach(({ img, border }) => {
        if (!fc.getObjects().includes(border)) return;
        const R = border.radius || Math.round(CW * 0.15);
        elements.push({ type: 'magnifier', left: border.left, top: border.top, radius: R * 0.9 });
      });
      return { canvas: { width: CW, height: CH }, elements };
    }

    function publish() {
      const btn = document.getElementById('pub');
      const data = JSON.stringify(extractRecipe());
      if (data.length > 4096) { toast('⚠️ 레시피가 너무 큽니다'); return; }
      btn.disabled = true; btn.textContent = '전송 중...';
      if (tg?.sendData) {
        try { tg.sendData(data); }
        catch (e) { toast('전송 실패: ' + e.message); btn.disabled = false; btn.textContent = '🚀 발행'; }
      } else {
        console.log('[DEV] Recipe:', data);
        toast('✅ DEV: 콘솔 확인');
        btn.disabled = false; btn.textContent = '🚀 발행';
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Utils
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function el(id) { return document.getElementById(id); }
    function el2(id) { return document.getElementById(id); }
    let _tt;
    function toast(msg) {
      const e = document.getElementById('toast');
      e.textContent = msg; e.classList.add('show');
      clearTimeout(_tt); _tt = setTimeout(() => e.classList.remove('show'), 3000);
    }
    function ldTxt(m) { el('ld-p').textContent = m; }
    function hideLd() {
      const e = el('ld'); e.classList.add('hide');
      setTimeout(() => { e.style.display = 'none'; }, 380);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Init
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function finishInit() {
      addDimmer();
      addTypo(TITLE, SUB);
      reStack();
      autoLoadLogo();
      fc.renderAll();

      // Restore from localStorage if available
      try {
        const saved = localStorage.getItem(STORE_KEY);
        if (saved) {
          _suspendSave = true;
          fc.loadFromJSON(JSON.parse(saved), () => {
            fc.renderAll(); syncRefs(); reStack();
            _suspendSave = false;
            _undo = [saved];
            hideLd(); openTab('text');
          });
          return;
        }
      } catch (e) { }

      saveState();   // initial snapshot
      hideLd();
      openTab('text');
    }

    loadBgCover(IMG, finishInit);
  </script>
</body>

</html>
