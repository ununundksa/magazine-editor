<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>0.1% 매거진 스튜디오 v2</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js" crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    :root {
      --bg: #000;
      --sur: #1c1c1e;
      --card: #2c2c2e;
      --bd: #3a3a3c;
      --txt: #fff;
      --mut: #98989d;
      --acc: #0a84ff;
      --dan: #ff453a;
      --grn: #30d158;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--txt);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh
    }

    /* ── Header ── */
    #hdr {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      background: var(--sur);
      border-bottom: 1px solid var(--bd)
    }

    .logo {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -.4px
    }

    .logo span {
      color: var(--acc)
    }

    #hint {
      font-size: 10px;
      color: var(--mut);
      max-width: 55%
    }

    /* ── Toolbar ── */
    #tb {
      flex-shrink: 0;
      display: flex;
      gap: 5px;
      padding: 7px 10px;
      background: var(--sur);
      border-bottom: 1px solid var(--bd);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none
    }

    #tb::-webkit-scrollbar {
      display: none
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 8px;
      color: var(--txt);
      font-size: 11px;
      white-space: nowrap;
      cursor: pointer;
      transition: .12s;
      user-select: none;
      font-family: inherit
    }

    .btn:active {
      opacity: .7;
      transform: scale(.95)
    }

    .btn.on {
      background: var(--acc);
      border-color: var(--acc)
    }

    .btn.dn {
      color: var(--dan)
    }

    .btn.grn {
      color: var(--grn)
    }

    /* ── Canvas wrapper + snap guides ── */
    #cw {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: #0a0a0a
    }

    .snap-line {
      position: absolute;
      pointer-events: none;
      display: none;
      z-index: 10;
      background: rgba(10, 132, 255, .85)
    }

    #sg-v {
      top: 0;
      bottom: 0;
      width: 1px;
      left: 50%;
      transform: translateX(-50%)
    }

    #sg-h {
      left: 0;
      right: 0;
      height: 1px;
      top: 50%;
      transform: translateY(-50%)
    }

    #canvas-scaler {
      position: relative
    }

    canvas {
      display: block;
      border-radius: 6px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, .9)
    }

    /* ── Props panel ── */
    #props {
      flex-shrink: 0;
      padding: 9px 12px;
      background: var(--sur);
      border-top: 1px solid var(--bd);
      display: none
    }

    #props.show {
      display: block
    }

    .pr {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px
    }

    .pr:last-child {
      margin-bottom: 0
    }

    .pr label {
      font-size: 10px;
      color: var(--mut);
      min-width: 44px
    }

    .pi {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 7px;
      padding: 6px 9px;
      color: var(--txt);
      font-size: 13px;
      font-family: inherit
    }

    .pi:focus {
      outline: none;
      border-color: var(--acc)
    }

    .pi[type=range] {
      padding: 0;
      height: 26px
    }

    .pi[type=color] {
      height: 32px;
      padding: 2px;
      cursor: pointer
    }

    .pv {
      font-size: 11px;
      color: var(--mut);
      min-width: 32px;
      text-align: right
    }

    /* ── Bottom ── */
    #bot {
      flex-shrink: 0;
      padding: 9px 14px;
      padding-bottom: max(9px, env(safe-area-inset-bottom));
      background: var(--sur);
      border-top: 1px solid var(--bd)
    }

    #pub {
      width: 100%;
      padding: 13px;
      background: var(--acc);
      border: none;
      border-radius: 11px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: .12s;
      letter-spacing: -.3px
    }

    #pub:active {
      transform: scale(.98);
      opacity: .9
    }

    #pub:disabled {
      background: var(--card);
      color: var(--mut)
    }

    /* ── Loading ── */
    #ld {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: .3s
    }

    #ld.hide {
      opacity: 0;
      pointer-events: none
    }

    .sp {
      width: 42px;
      height: 42px;
      border: 3px solid var(--bd);
      border-top-color: var(--acc);
      border-radius: 50%;
      animation: spin .75s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    #ld-msg {
      margin-top: 12px;
      color: var(--mut);
      font-size: 13px
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 8px 13px;
      font-size: 12px;
      opacity: 0;
      transition: .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 998
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    /* ── Hidden file inputs ── */
    input[type=file] {
      display: none
    }
  </style>
</head>

<body>

  <div id="ld">
    <div class="sp"></div>
    <p id="ld-msg">스튜디오 로딩 중...</p>
  </div>

  <div id="app">
    <div id="hdr">
      <div class="logo">[<span>0.1%</span>] Studio <span style="color:var(--mut);font-weight:400">v2</span></div>
      <div id="hint">요소를 선택하여 편집하세요</div>
    </div>

    <div id="tb">
      <button class="btn on" id="btn-typo" onclick="selTypo()">✦ 텍스트</button>
      <button class="btn" id="btn-pip" onclick="trigPip()">⊕ PiP</button>
      <button class="btn" id="btn-logo" onclick="trigLogo()">◈ 로고</button>
      <button class="btn dn" onclick="delSel()">✕ 삭제</button>
      <button class="btn" onclick="doReset()">↺ 초기화</button>
    </div>

    <!-- Canvas area with snap guide lines -->
    <div id="cw">
      <div id="sg-v" class="snap-line"></div>
      <div id="sg-h" class="snap-line"></div>
      <div id="canvas-scaler"><canvas id="c"></canvas></div>
    </div>

    <!-- Properties panel -->
    <div id="props">
      <div class="pr" id="r-txt">
        <label>텍스트</label>
        <input class="pi" id="p-txt" type="text" oninput="upTxt()">
      </div>
      <div class="pr" id="r-txt2">
        <label>서브</label>
        <input class="pi" id="p-txt2" type="text" oninput="upTxt2()">
      </div>
      <div class="pr" id="r-sz">
        <label>크기</label>
        <input class="pi" id="p-sz" type="range" min="8" max="120" value="44" oninput="upSz(this.value)">
        <span class="pv" id="p-sz-v">44</span>
      </div>
      <div class="pr" id="r-col">
        <label>색상</label>
        <input class="pi" id="p-col" type="color" value="#ffffff" oninput="upCol(this.value)">
      </div>
      <div class="pr" id="r-op">
        <label>투명도</label>
        <input class="pi" id="p-op" type="range" min="0" max="100" value="100" oninput="upOp(this.value)">
        <span class="pv" id="p-op-v">100%</span>
      </div>
    </div>

    <div id="bot">
      <button id="pub" onclick="publish()">🚀 최종 발행</button>
    </div>
  </div>
  <div id="toast"></div>

  <!-- Hidden file inputs -->
  <input type="file" id="fi-pip" accept="image/*" onchange="loadPip(this)">
  <input type="file" id="fi-logo" accept="image/*" onchange="loadLogo(this)">

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Telegram & URL Params
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

    const P = new URLSearchParams(location.search);
    const IMG = P.get('img') || '';
    const TITLE = decodeURIComponent(P.get('title') || '헤드라인 편집');
    const SUB = decodeURIComponent(P.get('sub') || '서브라인 편집');

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Canvas — 4:5 Responsive Display
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Display size (local coordinates); Python scales to 1080×1350 on export.
    const RATIO = 1350 / 1080;
    const wrap = document.getElementById('cw');
    const CW = Math.min(wrap.clientWidth - 16, 480);
    const CH = Math.round(CW * RATIO);

    const fc = new fabric.Canvas('c', {
      width: CW, height: CH,
      backgroundColor: '#111',
      preserveObjectStacking: true,
      selection: true
    });

    // ── Element registry ──────────────────────────────────────────────
    let typoGroup = null;  // fabric.Group (headline + subline)
    let logoObj = null;  // fabric.Image
    const pipObjs = [];    // fabric.Group[] (each = border circle + clipped image)

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Global Fabric.js Defaults (Circular Controls)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    fabric.Object.prototype.set({
      cornerStyle: 'circle',
      cornerSize: 14,
      cornerColor: '#ffffff',
      cornerStrokeColor: '#0a84ff',
      borderColor: '#0a84ff',
      borderScaleFactor: 2,
      transparentCorners: false,
      padding: 5,
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Centre-Snap Guidelines
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const sgV = document.getElementById('sg-v');
    const sgH = document.getElementById('sg-h');
    const SNAP = 12; // px threshold

    fc.on('object:moving', e => {
      const obj = e.target;
      if (!obj) return;
      const b = obj.getBoundingRect(true, true);
      const cx = b.left + b.width / 2;
      const cy = b.top + b.height / 2;

      // Snap to vertical centre
      if (Math.abs(cx - CW / 2) < SNAP) {
        obj.set({ left: obj.left + (CW / 2 - cx) });
        obj.setCoords();
        sgV.style.display = 'block';
      } else { sgV.style.display = 'none'; }

      // Snap to horizontal centre
      if (Math.abs(cy - CH / 2) < SNAP) {
        obj.set({ top: obj.top + (CH / 2 - cy) });
        obj.setCoords();
        sgH.style.display = 'block';
      } else { sgH.style.display = 'none'; }
    });
    fc.on('object:modified', () => {
      sgV.style.display = 'none';
      sgH.style.display = 'none';
    });
    fc.on('mouse:up', () => {
      sgV.style.display = 'none';
      sgH.style.display = 'none';
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 1. COVER Background Image
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function loadBgCover(url, onDone) {
      if (!url) { onDone(); return; }
      document.getElementById('ld-msg').textContent = '배경 이미지 로딩 중...';
      fabric.Image.fromURL(url, (img, err) => {
        if (!err && img && img.width) {
          // COVER: scale so image fills entire canvas
          const scX = CW / img.width;
          const scY = CH / img.height;
          const sc = Math.max(scX, scY);
          const ox = (CW - img.width * sc) / 2;
          const oy = (CH - img.height * sc) / 2;
          fc.setBackgroundImage(img, () => {
            img.set({
              scaleX: sc, scaleY: sc, left: ox, top: oy,
              originX: 'left', originY: 'top'
            });
            fc.renderAll();
            onDone();
          });
        } else {
          toast('⚠️ 배경 로드 실패 — 빈 캔버스로 시작합니다');
          onDone();
        }
      }, { crossOrigin: 'anonymous' });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 2. Dimming Gradient + Typography Group
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function addDimmer() {
      const dimH = CH * 0.52;
      const dim = new fabric.Rect({
        left: 0, top: CH - dimH, width: CW, height: dimH,
        fill: new fabric.Gradient({
          type: 'linear', gradientUnits: 'pixels',
          coords: { x1: 0, y1: 0, x2: 0, y2: dimH },
          colorStops: [
            { offset: 0, color: 'rgba(0,0,0,0)' },
            { offset: 0.45, color: 'rgba(0,0,0,0.55)' },
            { offset: 1, color: 'rgba(0,0,0,0.90)' },
          ]
        }),
        selectable: false, evented: false, elementType: 'dimmer'
      });
      fc.add(dim);
    }

    function addTypoGroup(title, sub) {
      const hlSz = Math.round(CW * 0.068);
      const slSz = Math.round(CW * 0.042);

      const hl = new fabric.IText(title, {
        fontSize: hlSz,
        fontWeight: '700',
        fontFamily: '-apple-system,Helvetica Neue,Arial,sans-serif',
        fill: '#ffffff',
        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,.85)', blur: 10, offsetX: 1, offsetY: 2 }),
        left: 0,
        top: 0,
        editable: true,
        elementType: 'headline',
        width: CW * 0.88,
      });

      const sl = new fabric.IText(sub, {
        fontSize: slSz,
        fontFamily: '-apple-system,Helvetica Neue,Arial,sans-serif',
        fill: '#dddddd',
        shadow: new fabric.Shadow({ color: 'rgba(0,0,0,.75)', blur: 7, offsetX: 1, offsetY: 1 }),
        left: 0,
        top: hlSz * 1.35 + 8,
        editable: true,
        elementType: 'subline',
        width: CW * 0.88,
      });

      // Create group — headline and subline are locked together, gap preserved
      typoGroup = new fabric.Group([hl, sl], {
        left: CW * 0.06,
        top: CH * 0.76,
        selectable: true,
        subTargetCheck: true,   // allow clicking sub-objects
        elementType: 'typo_group',
      });

      fc.add(typoGroup);
      fc.bringToFront(typoGroup);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 3. PiP Circular Insert (clipPath)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function trigPip() { document.getElementById('fi-pip').click(); }
    function trigLogo() { document.getElementById('fi-logo').click(); }

    function loadPip(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);
      const displayR = Math.round(CW * 0.155);

      fabric.Image.fromURL(url, (img, err) => {
        URL.revokeObjectURL(url);
        if (err || !img) { toast('⚠️ PiP 이미지 로드 실패'); return; }

        // Scale so image fills the circle diameter exactly
        const minDim = Math.min(img.width, img.height);
        const scale = (displayR * 2) / minDim;

        // Circular clipPath in LOCAL (pre-scale) coordinates
        const clipR = minDim / 2;
        const clipPth = new fabric.Circle({
          radius: clipR,
          originX: 'center',
          originY: 'center',
        });

        img.set({
          scaleX: scale,
          scaleY: scale,
          originX: 'center',
          originY: 'center',
          clipPath: clipPth,
          elementType: 'pip_img',
        });

        // White stroke border (same display radius, in group-local coords)
        const border = new fabric.Circle({
          radius: displayR + 3,
          fill: 'transparent',
          stroke: '#ffffff',
          strokeWidth: 4,
          originX: 'center',
          originY: 'center',
          selectable: false,
          evented: false,
          elementType: 'pip_border',
        });

        // Position both at (0,0) within the group (group controls position)
        img.set({ left: 0, top: 0 });
        border.set({ left: 0, top: 0 });

        const pip = new fabric.Group([border, img], {
          left: CW - displayR * 2 - CW * 0.06,
          top: CH - displayR * 2 - CH * 0.05,
          originX: 'left',
          originY: 'top',
          elementType: 'pip',
        });

        pipObjs.push(pip);
        fc.add(pip);
        fc.bringToFront(pip);
        if (typoGroup) fc.bringToFront(typoGroup);
        fc.renderAll();
        toast('✅ PiP 원형 이미지 추가됨');
        input.value = '';   // reset so same file can be re-selected
      }, { crossOrigin: 'anonymous' });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // 4. Logo / Watermark
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function loadLogo(input) {
      const file = input.files[0];
      if (!file) return;
      const url = URL.createObjectURL(file);

      fabric.Image.fromURL(url, (img, err) => {
        URL.revokeObjectURL(url);
        if (err || !img) { toast('⚠️ 로고 로드 실패'); return; }

        const maxW = CW * 0.30;
        const sc = Math.min(maxW / img.width, 1);

        img.set({
          scaleX: sc,
          scaleY: sc,
          left: CW - img.width * sc - CW * 0.04,
          top: CH * 0.03,
          opacity: 0.9,
          elementType: 'logo',
        });

        if (logoObj) fc.remove(logoObj);
        logoObj = img;
        fc.add(img);
        fc.bringToFront(img);
        if (typoGroup) fc.bringToFront(typoGroup);
        fc.setActiveObject(img);
        fc.renderAll();
        document.getElementById('btn-logo').classList.add('on');
        toast('✅ 로고 추가됨');
        input.value = '';
      }, { crossOrigin: 'anonymous' });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Toolbar Actions
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function selTypo() {
      if (typoGroup) { fc.setActiveObject(typoGroup); fc.renderAll(); }
    }

    function delSel() {
      const obj = fc.getActiveObject();
      if (!obj) return;
      const t = obj.elementType;
      if (t === 'dimmer') { toast('그라데이션은 삭제 불가'); return; }
      if (t === 'typo_group') typoGroup = null;
      if (t === 'logo') { logoObj = null; document.getElementById('btn-logo').classList.remove('on'); }
      if (t === 'pip') { const i = pipObjs.indexOf(obj); if (i > -1) pipObjs.splice(i, 1); }
      fc.remove(obj);
      hideProps();
      fc.renderAll();
    }

    function doReset() {
      if (!confirm('캔버스를 초기화할까요?')) return;
      // Keep background
      fc.getObjects().forEach(o => fc.remove(o));
      typoGroup = null; logoObj = null; pipObjs.length = 0;
      document.getElementById('btn-logo').classList.remove('on');
      addDimmer();
      addTypoGroup(TITLE, SUB);
      fc.renderAll();
      hideProps();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Properties Panel
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let _activeTypoSub = null;   // currently-selected IText inside typo group

    function showProps(obj) {
      const panel = document.getElementById('props');
      const t = obj.elementType;
      const isTypo = t === 'typo_group';
      const isText = t === 'headline' || t === 'subline';
      const isAny = true;

      document.getElementById('r-txt').style.display = (isText || isTypo) ? 'flex' : 'none';
      document.getElementById('r-txt2').style.display = isTypo ? 'flex' : 'none';
      document.getElementById('r-sz').style.display = (isText || isTypo) ? 'flex' : 'none';
      document.getElementById('r-col').style.display = (isText || isTypo) ? 'flex' : 'none';
      document.getElementById('r-op').style.display = isAny ? 'flex' : 'none';

      if (isTypo && typoGroup) {
        const subs = typoGroup.getObjects();
        const hl = subs.find(s => s.elementType === 'headline');
        const sl = subs.find(s => s.elementType === 'subline');
        if (hl) document.getElementById('p-txt').value = hl.text || '';
        if (sl) document.getElementById('p-txt2').value = sl.text || '';
        const fz = hl ? Math.round(hl.fontSize) : 44;
        document.getElementById('p-sz').value = fz;
        document.getElementById('p-sz-v').textContent = fz;
        document.getElementById('p-col').value = hl ? hl.fill : '#ffffff';
        _activeTypoSub = null;
      }

      if (isText) {
        _activeTypoSub = obj;
        document.getElementById('p-txt').value = obj.text || '';
        const fz = Math.round(obj.fontSize || 36);
        document.getElementById('p-sz').value = fz;
        document.getElementById('p-sz-v').textContent = fz;
        document.getElementById('p-col').value = obj.fill || '#ffffff';
      }

      // Opacity
      const opVal = Math.round((obj.opacity ?? 1) * 100);
      document.getElementById('p-op').value = opVal;
      document.getElementById('p-op-v').textContent = opVal + '%';

      document.getElementById('hint').textContent = t || '선택됨';
      panel.classList.add('show');
    }

    function hideProps() {
      document.getElementById('props').classList.remove('show');
      document.getElementById('hint').textContent = '요소를 선택하여 편집하세요';
      _activeTypoSub = null;
    }

    // Controls
    function upTxt() {
      const v = document.getElementById('p-txt').value;
      if (_activeTypoSub) {
        _activeTypoSub.set('text', v);
      } else if (typoGroup) {
        const hl = typoGroup.getObjects().find(s => s.elementType === 'headline');
        if (hl) hl.set('text', v);
      }
      fc.renderAll();
    }

    function upTxt2() {
      const v = document.getElementById('p-txt2').value;
      if (typoGroup) {
        const sl = typoGroup.getObjects().find(s => s.elementType === 'subline');
        if (sl) sl.set('text', v);
        fc.renderAll();
      }
    }

    function upSz(v) {
      document.getElementById('p-sz-v').textContent = v;
      const fz = parseInt(v);
      if (_activeTypoSub) {
        _activeTypoSub.set('fontSize', fz);
      } else if (typoGroup) {
        const hl = typoGroup.getObjects().find(s => s.elementType === 'headline');
        if (hl) hl.set('fontSize', fz);
      } else {
        const obj = fc.getActiveObject();
        if (obj?.set) obj.set('fontSize', fz);
      }
      fc.renderAll();
    }

    function upCol(v) {
      if (_activeTypoSub) {
        _activeTypoSub.set('fill', v);
      } else if (typoGroup) {
        const hl = typoGroup.getObjects().find(s => s.elementType === 'headline');
        if (hl) hl.set('fill', v);
      } else {
        const obj = fc.getActiveObject();
        if (obj?.set) obj.set('fill', v);
      }
      fc.renderAll();
    }

    function upOp(v) {
      document.getElementById('p-op-v').textContent = v + '%';
      const obj = fc.getActiveObject();
      if (obj?.set) { obj.set('opacity', v / 100); fc.renderAll(); }
    }

    // Selection events
    fc.on('selection:created', e => showProps(e.selected[0]));
    fc.on('selection:updated', e => showProps(e.selected[0]));
    fc.on('selection:cleared', () => hideProps());

    // Double-click inside typo group to select sub-object
    fc.on('mouse:dblclick', e => {
      if (!e.target) return;
      if (e.target.elementType !== 'typo_group') return;
      const sub = e.target.getObjects().find(o => {
        const b = o.getBoundingRect(false, false);
        const p = fc.getPointer(e.e);
        return p.x >= b.left && p.x <= b.left + b.width &&
          p.y >= b.top && p.y <= b.top + b.height;
      });
      if (sub) {
        fc.setActiveObject(sub);
        _activeTypoSub = sub;
        showProps(sub);
        fc.renderAll();
      }
    });

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Extract JSON Recipe
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function extractRecipe() {
      const elements = [];

      fc.getObjects().forEach(obj => {
        const t = obj.elementType;
        if (!t || t === 'dimmer') return;

        if (t === 'typo_group') {
          // Extract absolute position of each sub-text
          const gMat = obj.calcTransformMatrix();
          const gDec = fabric.util.qrDecompose(gMat);
          const gCx = gDec.translateX;
          const gCy = gDec.translateY;
          const gSx = gDec.scaleX || 1;
          const gSy = gDec.scaleY || 1;
          const gAng = gDec.angle || 0;

          obj.getObjects().forEach(sub => {
            const st = sub.elementType;
            if (st !== 'headline' && st !== 'subline') return;
            // sub.left/top are in group's local coordinate space (centered)
            const absLeft = gCx + sub.left * gSx;
            const absTop = gCy + sub.top * gSy;
            elements.push({
              type: st,
              text: sub.text || '',
              left: absLeft,
              top: absTop,
              fontSize: (sub.fontSize || 36),
              fill: sub.fill || '#ffffff',
              scaleX: gSx * (sub.scaleX || 1),
              scaleY: gSy * (sub.scaleY || 1),
              angle: gAng + (sub.angle || 0),
              width: (sub.width || CW * 0.88) * gSx,
            });
          });
        }

        else if (t === 'pip') {
          const b = obj.getBoundingRect(false, false);
          const r = Math.max(b.width, b.height) / 2;
          elements.push({
            type: 'magnifier',
            left: obj.left,
            top: obj.top,
            radius: r * 0.9,   // subtract border width
          });
        }

        else if (t === 'logo') {
          elements.push({
            type: 'logo',
            left: obj.left,
            top: obj.top,
            scaleX: obj.scaleX || 1,
            scaleY: obj.scaleY || 1,
            angle: obj.angle || 0,
            width: obj.width,
            height: obj.height,
            opacity: obj.opacity ?? 1,
          });
        }
      });

      return {
        canvas: { width: CW, height: CH },
        elements,
      };
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Publish
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function publish() {
      const btn = document.getElementById('pub');
      const data = JSON.stringify(extractRecipe());
      if (data.length > 4000) { toast('⚠️ 텍스트가 너무 깁니다'); return; }
      btn.disabled = true; btn.textContent = '전송 중...';
      if (tg?.sendData) {
        try { tg.sendData(data); }
        catch (e) { toast('전송 실패: ' + e.message); btn.disabled = false; btn.textContent = '🚀 최종 발행'; }
      } else {
        console.log('[DEV] Recipe:', data);
        toast('✅ DEV: 콘솔에 레시피가 출력되었습니다');
        btn.disabled = false; btn.textContent = '🚀 최종 발행';
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Toast
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let _tt;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Init
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function finishInit() {
      addDimmer();
      addTypoGroup(TITLE, SUB);
      fc.renderAll();
      const ld = document.getElementById('ld');
      ld.classList.add('hide');
      setTimeout(() => ld.style.display = 'none', 350);
    }

    loadBgCover(IMG, finishInit);
  </script>
</body>
